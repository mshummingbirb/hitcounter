apiVersion: v1
kind: Namespace
metadata:
  name: hitcounter

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: hitcounter
  labels:
    app: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7
          ports:
            - containerPort: 6379

---
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: hitcounter
spec:
  selector:
    app: redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hitcounter
  namespace: hitcounter
  labels:
    app: hitcounter
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hitcounter
  template:
    metadata:
      labels:
        app: hitcounter
    spec:
      containers:
        - name: hitcounter
          image: my-hit-counter:v1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          env:
            - name: REDIS_HOST
              value: "redis-service"
            - name: REDIS_PORT
              value: "6379"
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: hitcounter-service
  namespace: hitcounter
spec:
  selector:
    app: hitcounter
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: ClusterIP
